name = "tsa-proxy"
main = "tsa-proxy.js"
compatibility_date = "2024-01-01"

# Free tier: 100,000 requests/day
# Deploy: npx wrangler deploy
# Test locally: npx wrangler dev

# Cron trigger: auto-fetch TSA data for popular airports every 2 minutes
[triggers]
crons = ["*/2 * * * *"]

# KV namespace for shared crowd-reported wait times
# First create the namespace:
#   npx wrangler kv namespace create CROWD_KV
# Then paste the generated id below:
[[kv_namespaces]]
binding = "CROWD_KV"
id = "1c48a41315c944eaa9427205f5dadefd"
# For local dev (wrangler dev), also create a preview namespace:
# preview_id = "REPLACE_WITH_PREVIEW_ID"
